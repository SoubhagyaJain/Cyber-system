# ============================================================================
# CyberSentinel AI Dashboard — Development Docker Compose (Hot Reload)
# Run: docker compose -f docker-compose.dev.yml up --build
# ============================================================================
#
# This compose file mounts source code as volumes so changes are reflected
# instantly without rebuilding containers:
#   - Frontend: Vite dev server with HMR on :5173
#   - Backend:  Uvicorn with --reload on :8000
#   - Streamlit: auto-reloads on file change on :8501

services:
  # ── FastAPI Backend (Hot Reload) ──────────────────────────────────────────
  backend:
    build:
      context: ./cyber-dashboard/backend
      dockerfile: Dockerfile
    container_name: cybersentinel-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./cyber-dashboard/backend:/app
    command: >
      uvicorn server:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    environment:
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000/api/health" ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - cybersentinel-dev

  # ── React Frontend (Vite Dev Server + HMR) ────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: cybersentinel-frontend-dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./cyber-dashboard:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cybersentinel-dev

  # ── Streamlit Dashboard (Auto-Reload) ─────────────────────────────────────
  streamlit:
    build:
      context: ./IntrusionDetectionDashboard
      dockerfile: Dockerfile
    container_name: cybersentinel-streamlit-dev
    ports:
      - "8501:8501"
    volumes:
      - ./IntrusionDetectionDashboard:/app
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8501/_stcore/health" ]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - cybersentinel-dev

volumes:
  frontend_node_modules:


networks:
  cybersentinel-dev:
    driver: bridge
