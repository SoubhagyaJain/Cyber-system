# ============================================================================
# Nginx config — CyberSentinel Frontend
# Serves the React SPA + reverse-proxies /api/* to the FastAPI backend
# ============================================================================

# Use Docker's embedded DNS (127.0.0.11) so upstream hostnames are resolved
# per-request, not once at startup (which causes "host not found" crash).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Reverse proxy: /api/* → FastAPI backend ──────────────────────────
    # set $upstream forces dynamic DNS resolution via the resolver above.
    # A literal proxy_pass with a hostname would resolve once at startup
    # and crash if the backend container isn't up yet.
    location /api/ {
        set $upstream "http://backend:8000";
        proxy_pass $upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for ML training requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # ── Static assets: aggressive caching ────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback: serve index.html for all non-file routes ───────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block dotfiles ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
